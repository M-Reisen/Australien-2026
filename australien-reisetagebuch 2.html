.header-actions{display:flex;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;border:none;transition:all .18s;}
.btn-primary{background:var(--sunset);color:var(--white);}.btn-primary:hover{background:#c96a30;}
.btn-ghost{background:transparent;color:var(--sand);border:1px solid rgba(255,255,255,.22);}.btn-ghost:hover{background:rgba(255,255,255,.09);}
.btn-reef{background:var(--reef);color:var(--white);}

.btn-sm{padding:6px 12px;font-size:.76rem;}

// Load persisted edits (if any)
function loadCostsFromStorage(){
  try{
    const j = localStorage.getItem('australien_costs_v1');
    if(!j) return;
    const data = JSON.parse(j);
    COST_ITEMS.forEach(it=>{ if(data[it.id]!==undefined) it.amount = Number(data[it.id]) || 0; });
    // reflect booking prices
    COST_ITEMS.forEach(it=>{ if(it.ref){ const b = BOOKINGS.find(bk=>bk.id===it.ref); if(b) b.price = it.amount; } });
  }catch(e){console.warn('loadCostsFromStorage',e);} 
}

function saveCostsToStorage(){
  try{
    const obj = {}; COST_ITEMS.forEach(it=>obj[it.id]=it.amount);
    localStorage.setItem('australien_costs_v1', JSON.stringify(obj));
  }catch(e){console.warn('saveCostsToStorage',e);} 
}

function formatEUR(v){ return '€'+Number(v||0).toFixed(2); }

function onCostChange(id, raw){
  const val = parseFloat(String(raw).replace(',', '.')) || 0;
  const item = COST_ITEMS.find(i=>i.id===id);
  if(!item) return;
  item.amount = val;
  if(item.ref){ const b = BOOKINGS.find(bk=>bk.id===item.ref); if(b) b.price = val; }
  saveCostsToStorage();
  renderCosts();
}

// immediately load any saved costs

// Build days array: one entry per date Sep 13 – Oct 10
function buildDays() {
  const days = [];
  const start = new Date('2026-09-13T12:00:00');
  const end   = new Date('2026-10-10T12:00:00');
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)) {
    const iso = d.toISOString().split('T')[0];
    // find was happening this day
    const dayItems = TIMELINE.filter(t => t.datum === iso);
    const stay = BOOKINGS.find(b => {
      const s = new Date(b.datum+'T12:00:00');
      const e = new Date(s); e.setDate(e.getDate()+b.nights);
      const cur = new Date(iso+'T12:00:00');
      return cur >= s && cur < e;
    });
    days.push({ iso, dayItems, stay });
  }
  return days;
}

// ── COSTS ───────────────────────────────────────────────────────────
function renderCosts(){
  if(!pinUnlocked) return;
  // group items by category for clearer display
  const groups = {};
  COST_ITEMS.forEach(it => { (groups[it.category] = groups[it.category] || []).push(it); });

  let html = '';
  Object.keys(groups).forEach(cat => {
    html += `<div class="cost-section-title">${cat}</div>`;
    groups[cat].forEach(it => {
      html += `<div class="cost-row" data-id="${it.id}">
        <div>
          <div class="name">${it.label}</div>
          <div class="dates">${it.dates || ''}</div>
        </div>
        <div class="price">
          <input type="number" step="0.01" min="0" style="width:110px;padding:6px;border-radius:8px;border:1px solid rgba(0,0,0,.06);font-size:.9rem" value="${Number(it.amount||0).toFixed(2)}" onchange="onCostChange('${it.id}', this.value)" oninput="this.value=this.value.replace(/[^0-9\.,-]/g,'')">
        </div>
      </div>`;
    });
  });

  // Recompute totals
  const totalBookings = BOOKINGS.reduce((s,b)=>s + (Number(b.price)||0),0);
  const totalOther = COST_ITEMS.reduce((s,it)=> s + (it.ref ? 0 : (Number(it.amount)||0)),0);
  const grandTotal = totalBookings + totalOther;

  document.getElementById('cost-list').innerHTML = html;
  document.getElementById('cost-total').innerHTML = `<span>Unterkünfte gesamt (EUR)</span><span>€${totalBookings.toFixed(2)}</span>`;
  document.getElementById('grand-total-box').innerHTML = `<div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem;padding:14px 0 0;border-top:2px solid var(--sunset);margin-top:12px"><span>Gesamt (geschätzt)</span><span>€${grandTotal.toFixed(2)}</span></div>`;
}
